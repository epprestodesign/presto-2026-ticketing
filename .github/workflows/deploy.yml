name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

# Run JS-based actions on Node 24 (silences the Node 20 deprecation notice).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
          # Public URL of the separately-hosted imagery library (no secret).
          VITE_IMAGERY_URL: "https://epprestodesign.github.io/presto-ds-imagery"
          # Google Maps JS key for the Hotel Map pattern. Stored as a repo secret;
          # restrict it by HTTP referrer + Maps JS API in Google Cloud Console.
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

      # Build the clickable booking-journey prototype (a separate Vite app that
      # reuses the real library components) and nest it under the Storybook site
      # so it's served at /presto-2026/prototype/. It has no deps of its own —
      # it resolves vue/quasar/vite from the repo's node_modules installed above.
      - name: Build prototype (booking journey)
        working-directory: prototype
        run: node ../node_modules/vite/bin/vite.js build --base=/presto-2026/prototype/
        env:
          VITE_IMAGERY_URL: "https://epprestodesign.github.io/presto-ds-imagery"
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Nest prototype under Storybook
        run: cp -r prototype/dist storybook-static/prototype

      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
